services:
  - type: web
    name: mailguard-api
    runtime: python
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MONGO_URI
        sync: false   # Set this manually in the Render dashboard
      - key: JWT_SECRET
        sync: false   # Set this manually in the Render dashboard
